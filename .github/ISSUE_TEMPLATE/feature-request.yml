name: Feature Request
description: Suggest a completely new feature that doesn't exist yet
title: "[Feature Request]: "
labels: ["feature request"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for a new feature in DBackup? Please describe what you'd like to see added.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this feature solve? Is it related to a frustration?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered?

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of DBackup does this relate to?
      options:
        - Backup / Restore
        - Database Adapters
        - Storage Adapters
        - Notifications
        - UI / Dashboard
        - Authentication / SSO
        - Scheduling / Cron
        - API
        - Docker / Deployment
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or mockups.
