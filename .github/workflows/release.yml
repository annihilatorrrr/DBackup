# ─── Release ─────────────────────────────────────────────────
# Build multi-arch Docker images and push to GHCR + Docker Hub.
# Triggered on version tags (e.g., v1.0.2, v1.1.0-beta).

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  deployments: write

env:
  GHCR_IMAGE: ghcr.io/skyfay/dbackup
  DOCKERHUB_IMAGE: skyfay/dbackup

jobs:
  # ── Validate first ──────────────────────────────────────────
  validate:
    name: Validate
    uses: ./.github/workflows/validate.yml

  # ── Build per-arch images ───────────────────────────────────
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: validate
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (${{ matrix.suffix }})
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.GHCR_IMAGE }}:${{ github.ref_name }}-${{ matrix.suffix }}
          cache-from: type=registry,ref=${{ env.GHCR_IMAGE }}:buildcache-${{ matrix.suffix }}
          cache-to: type=registry,ref=${{ env.GHCR_IMAGE }}:buildcache-${{ matrix.suffix }},mode=max

  # ── Create multi-arch manifests ─────────────────────────────
  manifest:
    name: Create Manifests
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: ${{ contains(github.ref_name, '-dev') && 'dev' || contains(github.ref_name, '-beta') && 'beta' || 'production' }}
      url: https://hub.docker.com/r/skyfay/dbackup/tags
    steps:
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          TAG="${{ github.ref_name }}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

          if [[ "$TAG" == *-dev ]]; then
            echo "channel=dev" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == *-beta ]]; then
            echo "channel=beta" >> "$GITHUB_OUTPUT"
          else
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            MAJOR=$(echo "$TAG" | sed -nE 's/^(v[0-9]+)\..*$/\1/p')
            echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GHCR manifests
        run: |
          TAG="${{ steps.tags.outputs.version }}"
          SRC_AMD64="${{ env.GHCR_IMAGE }}:${TAG}-amd64"
          SRC_ARM64="${{ env.GHCR_IMAGE }}:${TAG}-arm64"

          # Version tag
          docker buildx imagetools create -t "${{ env.GHCR_IMAGE }}:${TAG}" "$SRC_AMD64" "$SRC_ARM64"

          # Channel tags
          CHANNEL="${{ steps.tags.outputs.channel }}"
          if [ "$CHANNEL" = "dev" ]; then
            docker buildx imagetools create -t "${{ env.GHCR_IMAGE }}:dev" "$SRC_AMD64" "$SRC_ARM64"
          elif [ "$CHANNEL" = "beta" ]; then
            docker buildx imagetools create -t "${{ env.GHCR_IMAGE }}:beta" "$SRC_AMD64" "$SRC_ARM64"
          else
            docker buildx imagetools create -t "${{ env.GHCR_IMAGE }}:latest" "$SRC_AMD64" "$SRC_ARM64"
            MAJOR="${{ steps.tags.outputs.major }}"
            if [ -n "$MAJOR" ] && [ "$MAJOR" != "v0" ]; then
              docker buildx imagetools create -t "${{ env.GHCR_IMAGE }}:${MAJOR}" "$SRC_AMD64" "$SRC_ARM64"
            fi
          fi

      - name: Create Docker Hub manifests
        if: vars.DOCKERHUB_USERNAME != ''
        run: |
          TAG="${{ steps.tags.outputs.version }}"
          SRC_AMD64="${{ env.GHCR_IMAGE }}:${TAG}-amd64"
          SRC_ARM64="${{ env.GHCR_IMAGE }}:${TAG}-arm64"

          # Version tag
          docker buildx imagetools create -t "${{ env.DOCKERHUB_IMAGE }}:${TAG}" "$SRC_AMD64" "$SRC_ARM64"

          # Channel tags
          CHANNEL="${{ steps.tags.outputs.channel }}"
          if [ "$CHANNEL" = "dev" ]; then
            docker buildx imagetools create -t "${{ env.DOCKERHUB_IMAGE }}:dev" "$SRC_AMD64" "$SRC_ARM64"
          elif [ "$CHANNEL" = "beta" ]; then
            docker buildx imagetools create -t "${{ env.DOCKERHUB_IMAGE }}:beta" "$SRC_AMD64" "$SRC_ARM64"
          else
            docker buildx imagetools create -t "${{ env.DOCKERHUB_IMAGE }}:latest" "$SRC_AMD64" "$SRC_ARM64"
            MAJOR="${{ steps.tags.outputs.major }}"
            if [ -n "$MAJOR" ] && [ "$MAJOR" != "v0" ]; then
              docker buildx imagetools create -t "${{ env.DOCKERHUB_IMAGE }}:${MAJOR}" "$SRC_AMD64" "$SRC_ARM64"
            fi
          fi

  # ── Push README to Docker Hub ───────────────────────────────
  readme:
    name: Push README to Docker Hub
    runs-on: ubuntu-latest
    needs: manifest
    if: vars.DOCKERHUB_USERNAME != ''
    steps:
      - uses: actions/checkout@v4

      - name: Push README to Docker Hub
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: skyfay/dbackup
          readme-filepath: README.md

  # ── Create GitHub Release ───────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: manifest
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Extract Release Notes from Changelog
        run: |
          TAG="${{ github.ref_name }}"
          echo "Extracting release notes for $TAG..."

          # Extract everything from the version header (inclusive) to the next version
          # Skip the "*Released: ..." date line (GitHub shows this already)
          # Strip "v1.0.2 - " prefix from the title, keeping just the description
          awk -v tag="^## $TAG" '
            $0 ~ tag {flag=1; sub(/^## v[^ ]+ - /, "## "); print; next}
            /^## v[0-9]/ {if(flag) exit}
            flag && /^\*Released:/ {next}
            flag {print}
          ' wiki/changelog.md > release_notes.md

          if [ ! -s release_notes.md ]; then
            echo "No release notes found for $TAG in wiki/changelog.md"
            exit 1
          fi

          echo "Found release notes:"
          cat release_notes.md

      - name: Publish Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-dev') }}
