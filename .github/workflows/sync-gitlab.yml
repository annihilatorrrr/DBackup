# ─── Sync to GitLab ──────────────────────────────────────────
# Mirrors all commits and tags to GitLab so activity is
# reflected in the GitLab profile.
# Uses: https://github.com/marketplace/actions/sync-to-gitlab

name: Sync to GitLab

on:
  # Daily at 04:00 UTC – skipped if no commits in the last 24h
  schedule:
    - cron: "0 4 * * *"
  # Allow manual trigger
  workflow_dispatch:

jobs:
  sync:
    name: Mirror to GitLab
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for recent commits (scheduled runs only)
        if: github.event_name == 'schedule'
        run: |
          LAST_COMMIT=$(git log -1 --format=%ct)
          NOW=$(date +%s)
          if [ $((NOW - LAST_COMMIT)) -gt 86400 ]; then
            echo "No commits in the last 24h, skipping sync."
            echo "SKIP=true" >> $GITHUB_ENV
          fi

      - name: Push mirror to GitLab
        if: env.SKIP != 'true'
        env:
          GITLAB_USERNAME: ${{ vars.GITLAB_USERNAME }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_REPO_URL: ${{ vars.GITLAB_REPO_URL }}
        run: |
          # Inject credentials into the URL: https://... → https://user:token@...
          AUTHENTICATED_URL="${GITLAB_REPO_URL/https:\/\//https:\/\/${GITLAB_USERNAME}:${GITLAB_TOKEN}@}"
          git remote add gitlab "$AUTHENTICATED_URL"
          git push --force --all gitlab
          git push --force --tags gitlab
