<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DBackup API Reference</title>
  <meta name="description" content="Complete REST API reference for DBackup — self-hosted database backup automation." />
  <link rel="icon" type="image/svg+xml" href="https://dbackup.app/logo.svg" />

  <style>
    /* Custom DBackup theme overrides */
    .scalar-app {
      --scalar-background-1: #09090b;
      --scalar-color-1: #fafafa;
      --scalar-color-accent: #3b82f6;
    }
  </style>
</head>
<body>
  <script
    id="api-reference"
    data-url="./openapi.yaml"
    data-configuration='{
      "theme": "default",
      "metaData": {
        "title": "DBackup API Reference"
      },
      "hiddenClients": [],
      "defaultHttpClient": {
        "targetKey": "shell",
        "clientKey": "curl"
      },
      "agent": {
        "disabled": true
      }
    }'
  ></script>
  <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
</body>
</html>
