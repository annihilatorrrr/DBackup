variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2

stages:
  - validate
  - build
  - manifest
  - deploy

# ─── Validate Stage ──────────────────────────────────────────────
# Lint, type checking, and unit tests run in parallel.
# Triggered on tags and merge requests as a quality gate.

.validate-base:
  stage: validate
  image: node:20-alpine
  services: []
  cache:
    key: pnpm-$CI_COMMIT_REF_SLUG
    paths:
      - .pnpm-store/
  before_script:
    - corepack enable && corepack prepare pnpm@10 --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile
    - npx prisma generate
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

validate:lint:
  extends: .validate-base
  script:
    - pnpm lint

validate:type:
  extends: .validate-base
  variables:
    NODE_OPTIONS: "--max-old-space-size=4096"
  script:
    - pnpm type

validate:test:
  extends: .validate-base
  script:
    - pnpm test -- --run

# ─── Build Stage ─────────────────────────────────────────────────
# AMD64 and ARM64 images build in parallel, each pushed to the
# GitLab registry with an architecture suffix.

.build-base:
  stage: build
  image: docker:28-cli
  services:
    - docker:28-dind
  before_script:
    - echo "🔐 GitLab Registry Login..."
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - |
      if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
        echo "🐳 Docker Hub Login..."
        docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_TOKEN"
      fi
    - docker buildx create --use
    - docker buildx inspect --bootstrap
    - export LOWERCASE_PROJECT_PATH=$(echo "$CI_PROJECT_PATH" | tr '[:upper:]' '[:lower:]')
    - export GITLAB_IMAGE="$CI_REGISTRY/$LOWERCASE_PROJECT_PATH"
  rules:
    - if: $CI_COMMIT_TAG

build:amd64:
  extends: .build-base
  script:
    - |
      docker buildx build \
        --platform linux/amd64 \
        --cache-from type=registry,ref=$GITLAB_IMAGE:buildcache-amd64 \
        --cache-to type=registry,ref=$GITLAB_IMAGE:buildcache-amd64,mode=max \
        --push \
        -t $GITLAB_IMAGE:${CI_COMMIT_TAG}-amd64 \
        .

build:arm64:
  extends: .build-base
  script:
    - |
      docker buildx build \
        --platform linux/arm64 \
        --cache-from type=registry,ref=$GITLAB_IMAGE:buildcache-arm64 \
        --cache-to type=registry,ref=$GITLAB_IMAGE:buildcache-arm64,mode=max \
        --push \
        -t $GITLAB_IMAGE:${CI_COMMIT_TAG}-arm64 \
        .

# ─── Manifest Stage ─────────────────────────────────────────────
# Combines AMD64 + ARM64 images into multi-arch manifest lists
# and pushes to GitLab Registry + Docker Hub.

manifest:
  stage: manifest
  image: docker:28-cli
  services:
    - docker:28-dind
  needs:
    - build:amd64
    - build:arm64
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - |
      if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
        docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_TOKEN"
      fi
    - docker buildx create --use
    - export LOWERCASE_PROJECT_PATH=$(echo "$CI_PROJECT_PATH" | tr '[:upper:]' '[:lower:]')
    - export GITLAB_IMAGE="$CI_REGISTRY/$LOWERCASE_PROJECT_PATH"
  script:
    - |
      SRC_AMD64="$GITLAB_IMAGE:${CI_COMMIT_TAG}-amd64"
      SRC_ARM64="$GITLAB_IMAGE:${CI_COMMIT_TAG}-arm64"

      # Helper: create a multi-arch manifest for a given tag
      create_manifest() {
        local TAG="$1"
        echo "📦 Creating manifest for $TAG"
        docker buildx imagetools create -t "$TAG" "$SRC_AMD64" "$SRC_ARM64"
      }

      # Version tag (always)
      create_manifest "$GITLAB_IMAGE:$CI_COMMIT_TAG"
      [ -n "$DOCKERHUB_REPO" ] && create_manifest "$DOCKERHUB_REPO:$CI_COMMIT_TAG"

      # Channel-specific tags
      if echo "$CI_COMMIT_TAG" | grep -q "\-dev"; then
        echo "🚧 Development Build detected (-dev suffix)"
        create_manifest "$GITLAB_IMAGE:dev"
        [ -n "$DOCKERHUB_REPO" ] && create_manifest "$DOCKERHUB_REPO:dev"

      elif echo "$CI_COMMIT_TAG" | grep -q "\-beta"; then
        echo "🧪 Beta Build detected (-beta suffix)"
        create_manifest "$GITLAB_IMAGE:beta"
        [ -n "$DOCKERHUB_REPO" ] && create_manifest "$DOCKERHUB_REPO:beta"

      else
        echo "🚀 Release Build detected"
        create_manifest "$GITLAB_IMAGE:latest"
        [ -n "$DOCKERHUB_REPO" ] && create_manifest "$DOCKERHUB_REPO:latest"

        # Major version tag (e.g., v1.2.3 -> v1)
        MAJOR_TAG=$(echo "$CI_COMMIT_TAG" | sed -nE 's/^(v[0-9]+)\..*$/\1/p')
        if [ -n "$MAJOR_TAG" ] && [ "$MAJOR_TAG" != "v0" ]; then
          create_manifest "$GITLAB_IMAGE:$MAJOR_TAG"
          [ -n "$DOCKERHUB_REPO" ] && create_manifest "$DOCKERHUB_REPO:$MAJOR_TAG"
        fi
      fi
  rules:
    - if: $CI_COMMIT_TAG

# ─── Deploy Stage ────────────────────────────────────────────────
# Push README.md (with absolute image URLs) to Docker Hub.

deploy:readme:
  stage: deploy
  image: alpine:3.20
  services: []
  needs:
    - manifest
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ] || [ -z "$DOCKERHUB_REPO" ]; then
        echo "⚠️ Docker Hub credentials not set, skipping README push"
        exit 0
      fi

      # Replace relative image paths with absolute GitLab raw URLs
      RAW_BASE="${CI_PROJECT_URL}/-/raw/${CI_COMMIT_TAG}"
      sed -e "s|src=\"wiki/public/|src=\"${RAW_BASE}/wiki/public/|g" \
          -e "s|(wiki/public/|(${RAW_BASE}/wiki/public/|g" \
          README.md > README_dockerhub.md

      # Authenticate with Docker Hub API
      TOKEN=$(curl -s -H "Content-Type: application/json" \
        -X POST "https://hub.docker.com/v2/users/login" \
        -d "{\"username\":\"${DOCKERHUB_USERNAME}\",\"password\":\"${DOCKERHUB_TOKEN}\"}" | \
        jq -r '.token')

      if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
        echo "❌ Docker Hub authentication failed"
        exit 1
      fi

      # Update Docker Hub repository description
      jq -n --arg desc "$(cat README_dockerhub.md)" \
        '{"full_description": $desc}' | \
      curl -s -X PATCH \
        -H "Authorization: Bearer $TOKEN" \
        -H "Content-Type: application/json" \
        -d @- \
        "https://hub.docker.com/v2/repositories/${DOCKERHUB_REPO}/"

      echo "✅ README pushed to Docker Hub"
  rules:
    - if: $CI_COMMIT_TAG
